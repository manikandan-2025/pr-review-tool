# =============================================================================
#  repos.conf — Repository Registry
#
#  Each non-comment line defines one repository the tool can operate on.
#  Format: alias|github_owner/repo|local_clone_path
#
#  - alias       : short name used to select this repo (e.g. pas-ou)
#  - github_repo : owner/repo on GitHub (used by gh CLI and gh api calls)
#  - local_path  : absolute path to your local git clone
#
#  Add a new repo:
#    echo "myrepo|org/myrepo|/home/you/myrepo" >> config/repos.conf
#  Or use the interactive menu: option 7 → Manage Repositories
# =============================================================================

