#!/usr/bin/env bash
# =============================================================================
#  settings.conf — PR Review Tool Configuration
#  Edit these paths to match your local environment.
# =============================================================================

# ---------------------------------------------------------------------------
# Multi-repo configuration
# ---------------------------------------------------------------------------

# Path to the repository registry file (one repo per line: alias|gh_repo|path)
REPOS_FILE="${REPOS_FILE:-$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/repos.conf}"

# Alias of the currently active repository (must match an alias in repos.conf)
# Switch interactively via menu option 7 → Manage Repositories → Switch Active
ACTIVE_REPO="pas-ou"

# NOTE: REPO_PATH and GITHUB_REPO are resolved at startup from ACTIVE_REPO.
# They do NOT need to be set here — load_active_repo() fills them in.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

# Path to the review instructions file (bundled in this repo)
INSTRUCTIONS_FILE="${INSTRUCTIONS_FILE:-$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)/pr-review.instructions.md}"

# Directory where isolated PR worktrees will be created
CHECKOUTS_DIR="${CHECKOUTS_DIR:-/home/orbisu/pas-project/pr-review-tool/checkouts}"

# Directory where generated reports will be saved
REPORTS_DIR="${REPORTS_DIR:-/home/orbisu/pas-project/pr-review-tool/reports}"

# ---------------------------------------------------------------------------
# Behaviour
# ---------------------------------------------------------------------------

# Editor for editing instructions (falls back to nano if not set)
EDITOR="${EDITOR:-nano}"

# Default base branch to compare PRs against (and to branch from for new features)
DEFAULT_BASE_BRANCH="main"

# File extensions to scan during analysis
SCAN_EXTENSIONS=("ts" "html" "scss" "json")

# Whether to post the report as a GitHub PR comment automatically (true/false)
AUTO_POST_COMMENT="false"

# ---------------------------------------------------------------------------
# Jira Integration (non-sensitive settings — safe to commit)
# ---------------------------------------------------------------------------

# Jira instance base URL (no trailing slash), e.g. https://jira.yourcompany.com
JIRA_BASE_URL="https://jira.dedalus.com"

# Jira REST API version (default: 2)
JIRA_API_VERSION="2"

# Custom field ID for Acceptance Criteria (optional, e.g. customfield_10028)
JIRA_AC_FIELD="${JIRA_AC_FIELD:-}"

# ---------------------------------------------------------------------------
# Sensitive credential (JIRA_PAT) is stored in config/secrets.conf
# (gitignored, chmod 600). Run menu option 8 to configure, or:
#   cp config/secrets.conf.example config/secrets.conf && chmod 600 config/secrets.conf
# ---------------------------------------------------------------------------
