#!/usr/bin/env bash
# =============================================================================
#  settings.conf — PR Review Tool Configuration
#  Copy settings.conf.example to settings.conf and edit paths for your machine.
# =============================================================================

# Absolute path to your local clone of dedalus-cis4u/pas-ou
REPO_PATH="${REPO_PATH:-/path/to/your/pas-ou}"

# GitHub repo identifier (owner/repo)
GITHUB_REPO="dedalus-cis4u/pas-ou"

# Path to the review instructions file (used for rule scanning)
INSTRUCTIONS_FILE="${INSTRUCTIONS_FILE:-/path/to/pr-review.instructions.md}"

# Directory where isolated PR worktrees will be created (auto-created)
CHECKOUTS_DIR="${CHECKOUTS_DIR:-$(dirname "$0")/checkouts}"

# Directory where generated reports will be saved (auto-created)
REPORTS_DIR="${REPORTS_DIR:-$(dirname "$0")/reports}"

# Editor for editing instructions (falls back to nano if not set)
EDITOR="${EDITOR:-nano}"

# Default base branch to compare PRs against
DEFAULT_BASE_BRANCH="main"

# File extensions to scan during analysis
SCAN_EXTENSIONS=("ts" "html" "scss" "json")

# Whether to post the report as a GitHub PR comment automatically (true/false)
AUTO_POST_COMMENT="false"
